<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
        button { background: #667eea; color: white; border: none; cursor: pointer; }
        button:hover { background: #5a67d8; }
        .password { font-size: 28px; text-align: center; padding: 20px; background: #f8f9fa; border-radius: 8px; margin: 15px 0; word-break: break-all; letter-spacing: 2px; font-family: monospace; }
        .back-btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #667eea; color: white; text-decoration: none; border-radius: 8px; }
        .options { display: flex; gap: 15px; flex-wrap: wrap; }
        .options label { font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔑 Password Generator</h1>
        <p>Strong password banayein</p>
        <div class="options">
            <label><input type="checkbox" id="uppercase" checked> A-Z</label>
            <label><input type="checkbox" id="lowercase" checked> a-z</label>
            <label><input type="checkbox" id="numbers" checked> 0-9</label>
            <label><input type="checkbox" id="symbols" checked> !@#$</label>
        </div>
        <input type="number" id="length" value="16" min="4" max="64">
        <button onclick="generatePassword()">Generate Password</button>
        <div class="password" id="password">Click to generate</div>
        <button onclick="copyPassword()" style="background:#28a745;">📋 Copy Password</button>
        <a href="/" class="back-btn">⬅ Back to Home</a>
    </div>
    <script>
        function generatePassword() {
            const length = parseInt(document.getElementById('length').value);
            const useUpper = document.getElementById('uppercase').checked;
            const useLower = document.getElementById('lowercase').checked;
            const useNumbers = document.getElementById('numbers').checked;
            const useSymbols = document.getElementById('symbols').checked;
            const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const lower = 'abcdefghijklmnopqrstuvwxyz';
            const numbers = '0123456789';
            const symbols = '!@#$%^&*()_+-=[]{}|;:,.<>?';
            let chars = '';
            if (useUpper) chars += upper;
            if (useLower) chars += lower;
            if (useNumbers) chars += numbers;
            if (useSymbols) chars += symbols;
            if (!chars) { document.getElementById('password').textContent = 'Select at least one option'; return; }
            let password = '';
            for (let i = 0; i < length; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('password').textContent = password;
        }
        function copyPassword() {
            const password = document.getElementById('password').textContent;
            if (password && password !== 'Click to generate' && password !== 'Select at least one option') {
                navigator.clipboard.writeText(password);
                alert('✅ Password copied to clipboard!');
            } else {
                alert('Generate a password first!');
            }
        }
    </script>
</body>
</html>
