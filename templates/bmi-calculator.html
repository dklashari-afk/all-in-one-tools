<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 20px;
        }
        select, input, button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.02);
        }
        .result-box {
            text-align: center;
            padding: 20px;
            background: #f9fafb;
            border-radius: 10px;
            margin-top: 15px;
        }
        .bmi-value {
            font-size: 48px;
            font-weight: 700;
            color: #667eea;
        }
        .bmi-category {
            font-size: 20px;
            font-weight: 600;
            margin-top: 5px;
        }
        .bmi-desc {
            color: #6b7280;
            font-size: 14px;
            margin-top: 5px;
        }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #f3f4f6;
            color: #1f2937;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 500;
        }
        .back-btn:hover {
            background: #e5e7eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚖️ BMI Calculator</h1>
        <p class="subtitle">Apna Body Mass Index (BMI) calculate karein</p>

        <select id="unit">
            <option value="metric">Metric (kg, cm)</option>
            <option value="imperial">Imperial (lb, inches)</option>
        </select>

        <input type="number" id="weight" placeholder="Weight" value="70" step="any">
        <input type="number" id="height" placeholder="Height" value="175" step="any">

        <button onclick="calculateBMI()">Calculate BMI</button>

        <div class="result-box" id="result">
            <div class="bmi-value" id="bmiValue">22.9</div>
            <div class="bmi-category" id="bmiCategory" style="color: #22c55e;">✅ Normal</div>
            <div class="bmi-desc" id="bmiDesc">Healthy weight range</div>
        </div>

        <a href="/" class="back-btn">⬅ Back to Home</a>
    </div>

    <script>
        function calculateBMI() {
            const unit = document.getElementById('unit').value;
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value);

            // Validation
            if (isNaN(weight) || isNaN(height) || weight <= 0 || height <= 0) {
                document.getElementById('bmiValue').textContent = '❌';
                document.getElementById('bmiCategory').textContent = 'Invalid Input';
                document.getElementById('bmiCategory').style.color = '#ef4444';
                document.getElementById('bmiDesc').textContent = 'Please enter valid numbers';
                return;
            }

            let bmi;
            if (unit === 'metric') {
                // BMI = weight (kg) / (height in meters)^2
                bmi = weight / ((height / 100) * (height / 100));
            } else {
                // Imperial: BMI = (weight in lbs / (height in inches)^2) * 703
                bmi = (weight / (height * height)) * 703;
            }

            bmi = Math.round(bmi * 10) / 10;
            document.getElementById('bmiValue').textContent = bmi;

            let category, color, desc;
            if (bmi < 18.5) {
                category = 'Underweight';
                color = '#f59e0b';
                desc = 'Weight kam hai, healthy diet lein';
            } else if (bmi < 25) {
                category = '✅ Normal';
                color = '#22c55e';
                desc = 'Healthy weight range';
            } else if (bmi < 30) {
                category = '⚠️ Overweight';
                color = '#f59e0b';
                desc = 'Weight zyada hai, exercise karein';
            } else {
                category = '❌ Obese';
                color = '#ef4444';
                desc = 'Health risk hai, doctor se rabta karein';
            }

            document.getElementById('bmiCategory').textContent = category;
            document.getElementById('bmiCategory').style.color = color;
            document.getElementById('bmiDesc').textContent = desc;
        }
    </script>
</body>
</html>
