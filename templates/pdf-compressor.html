<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Compressor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.08); }
        h1 { font-size: 28px; font-weight: 700; color: #1f2937; }
        input, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: 1px solid #e5e7eb; font-size: 16px; }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; cursor: pointer; font-weight: 600; transition: transform 0.2s; }
        button:hover { transform: scale(1.02); }
        .back-btn { display: inline-block; margin-top: 20px; padding: 12px 24px; background: #f3f4f6; color: #1f2937; text-decoration: none; border-radius: 10px; }
        #status { text-align: center; margin-top: 15px; padding: 15px; border-radius: 10px; background: #f9fafb; color: #6b7280; }
        .size-info { display: flex; justify-content: space-between; padding: 15px; background: #f9fafb; border-radius: 10px; margin: 10px 0; }
        .size-info span { font-weight: 600; }
        .progress { width: 100%; height: 8px; background: #e5e7eb; border-radius: 10px; overflow: hidden; display: none; margin: 10px 0; }
        .progress-bar { height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); width: 0%; transition: width 0.3s; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 PDF Compressor</h1>
        <p>PDF upload karein aur size 50% tak kam karein</p>

        <input type="file" id="pdfInput" accept=".pdf">
        <div class="size-info">
            <span>Original Size: <span id="originalSize">-</span></span>
            <span>Compressed: <span id="compressedSize">-</span></span>
        </div>
        <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
        <button onclick="compressPDF()">⬇️ Compress PDF</button>
        <div id="status">Select a PDF file</div>
        <a href="/" class="back-btn">⬅ Back to Home</a>
    </div>
    <script>
        async function compressPDF() {
            const file = document.getElementById('pdfInput').files[0];
            if (!file) { alert('Please select a PDF file'); return; }
            
            document.getElementById('status').textContent = '⏳ Compressing...';
            document.getElementById('progressBar').style.width = '30%';
            document.getElementById('progress').style.display = 'block';
            
            const formData = new FormData();
            formData.append('pdf', file);
            
            try {
                const response = await fetch('/compress-pdf', { method: 'POST', body: formData });
                document.getElementById('progressBar').style.width = '80%';
                
                if (response.ok) {
                    const blob = await response.blob();
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = 'compressed.pdf';
                    link.click();
                    document.getElementById('progressBar').style.width = '100%';
                    document.getElementById('status').textContent = '✅ Compression complete! Downloading...';
                    document.getElementById('compressedSize').textContent = (blob.size / 1024).toFixed(1) + ' KB';
                } else {
                    const data = await response.json();
                    document.getElementById('status').textContent = '❌ ' + data.error;
                }
            } catch (error) {
                document.getElementById('status').textContent = '❌ ' + error.message;
            }
        }

        document.getElementById('pdfInput').addEventListener('change', function() {
            if (this.files[0]) {
                document.getElementById('originalSize').textContent = (this.files[0].size / 1024).toFixed(1) + ' KB';
                document.getElementById('status').textContent = 'Ready to compress';
            }
        });
    </script>
</body>
</html>
