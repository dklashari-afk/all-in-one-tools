<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Converter</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        input, button, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
        button { background: #667eea; color: white; border: none; cursor: pointer; }
        button:hover { background: #5a67d8; }
        .back-btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #667eea; color: white; text-decoration: none; border-radius: 8px; }
        #result { text-align: center; margin-top: 20px; }
        #result img { max-width: 100%; max-height: 400px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Image Converter</h1>
        <p>Image upload karein aur format choose karein</p>
        <input type="file" id="imageInput" accept="image/*">
        <select id="formatSelect">
            <option value="PNG">PNG</option>
            <option value="JPEG">JPG</option>
            <option value="WEBP">WEBP</option>
        </select>
        <button onclick="convertImage()">Convert Image</button>
        <div id="result"></div>
        <a href="/" class="back-btn">⬅ Back to Home</a>
    </div>
    <script>
        async function convertImage() {
            const file = document.getElementById('imageInput').files[0];
            if (!file) { alert('Please select an image'); return; }
            const format = document.getElementById('formatSelect').value;
            const formData = new FormData();
            formData.append('image', file);
            formData.append('format', format);
            document.getElementById('result').innerHTML = '<p>Converting...</p>';
            try {
                const response = await fetch('/convert-image', { method: 'POST', body: formData });
                const data = await response.json();
                if (data.success) {
                    const mimeType = format === 'JPEG' ? 'image/jpeg' : `image/${format.toLowerCase()}`;
                    document.getElementById('result').innerHTML = `
                        <p>✅ Converted to ${format}!</p>
                        <img src="data:${mimeType};base64,${data.image}" alt="Converted Image">
                        <br><br>
                        <a href="data:${mimeType};base64,${data.image}" download="converted.${format.toLowerCase()}" style="background:#28a745;color:white;padding:10px 20px;border-radius:8px;text-decoration:none;">⬇️ Download</a>
                    `;
                } else {
                    document.getElementById('result').innerHTML = `<p style="color:red;">❌ ${data.error}</p>`;
                }
            } catch (error) {
                document.getElementById('result').innerHTML = `<p style="color:red;">❌ ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
