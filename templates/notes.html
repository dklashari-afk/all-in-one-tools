<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes / Todo List</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.08); }
        h1 { font-size: 28px; font-weight: 700; color: #1f2937; }
        .input-row { display: flex; gap: 10px; margin: 15px 0; }
        .input-row input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #e5e7eb; font-size: 16px; }
        .input-row button { padding: 12px 24px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .input-row button:hover { transform: scale(1.02); }
        .note-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #f9fafb; border-radius: 10px; margin: 8px 0; border-left: 4px solid #667eea; }
        .note-item .text { flex: 1; }
        .note-item .text.done { text-decoration: line-through; color: #9ca3af; }
        .note-item .actions { display: flex; gap: 8px; }
        .note-item .actions button { background: none; border: none; cursor: pointer; font-size: 18px; padding: 4px 8px; border-radius: 6px; transition: 0.2s; }
        .note-item .actions .done-btn { color: #22c55e; }
        .note-item .actions .done-btn:hover { background: #dcfce7; }
        .note-item .actions .del-btn { color: #ef4444; }
        .note-item .actions .del-btn:hover { background: #fee2e2; }
        .stats { display: flex; gap: 20px; margin-top: 15px; padding: 15px; background: #f9fafb; border-radius: 10px; color: #6b7280; font-size: 14px; }
        .stats span { font-weight: 600; color: #1f2937; }
        .back-btn { display: inline-block; margin-top: 20px; padding: 12px 24px; background: #f3f4f6; color: #1f2937; text-decoration: none; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Notes / Todo List</h1>
        <p>Apni notes likhein aur save karein (browser memory mein)</p>

        <div class="input-row">
            <input type="text" id="noteInput" placeholder="Enter your note..." />
            <button onclick="addNote()">Add</button>
        </div>

        <div id="notesList"></div>

        <div class="stats">
            <div>Total: <span id="totalCount">0</span></div>
            <div>Done: <span id="doneCount">0</span></div>
            <div>Pending: <span id="pendingCount">0</span></div>
        </div>

        <a href="/" class="back-btn">⬅ Back to Home</a>
    </div>

    <script>
        let notes = JSON.parse(localStorage.getItem('notes')) || [];

        function saveNotes() {
            localStorage.setItem('notes', JSON.stringify(notes));
            renderNotes();
        }

        function addNote() {
            const input = document.getElementById('noteInput');
            const text = input.value.trim();
            if (!text) { alert('Please enter a note'); return; }
            notes.push({ id: Date.now(), text: text, done: false });
            input.value = '';
            saveNotes();
        }

        function toggleNote(id) {
            const note = notes.find(n => n.id === id);
            if (note) { note.done = !note.done; saveNotes(); }
        }

        function deleteNote(id) {
            notes = notes.filter(n => n.id !== id);
            saveNotes();
        }

        function renderNotes() {
            const container = document.getElementById('notesList');
            container.innerHTML = '';
            if (notes.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#9ca3af;padding:20px;">No notes yet. Add one above!</p>';
            } else {
                notes.forEach(n => {
                    const div = document.createElement('div');
                    div.className = 'note-item';
                    div.innerHTML = `
                        <span class="text ${n.done ? 'done' : ''}">${n.text}</span>
                        <div class="actions">
                            <button class="done-btn" onclick="toggleNote(${n.id})">${n.done ? '↩️' : '✅'}</button>
                            <button class="del-btn" onclick="deleteNote(${n.id})">🗑️</button>
                        </div>
                    `;
                    container.appendChild(div);
                });
            }
            document.getElementById('totalCount').textContent = notes.length;
            document.getElementById('doneCount').textContent = notes.filter(n => n.done).length;
            document.getElementById('pendingCount').textContent = notes.filter(n => !n.done).length;
        }

        document.getElementById('noteInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addNote();
        });

        renderNotes();
    </script>
</body>
</html>
